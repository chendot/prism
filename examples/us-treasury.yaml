meta:
  title: 美债如何运作
  subtitle: null
  topic: 美债如何运作
  ontology: financial
  template: value_flow
  visual_theme: warm_layered
  target_format: null
  audience: beginner
  language: zh
  tags:
  - treasury
  - bonds
  - macro
diagram:
  type: flow
  direction: LR
nodes:
- id: investors
  label: 投资者
  sublabel: 提供资金购买国债
  role: buyer
  status: neutral
  layer: 1
  weight: secondary
- id: primary_dealers
  label: 一级交易商
  sublabel: 承销国债并分销给市场
  role: intermediary
  status: neutral
  layer: 2
  weight: secondary
- id: auction
  label: 国债拍卖
  sublabel: 形成价格、利率和中标分配
  role: market
  status: neutral
  layer: 3
  weight: secondary
- id: treasury
  label: 美国财政部
  sublabel: 发行国债并获得融资
  role: issuer
  status: neutral
  layer: 4
  weight: secondary
- id: treasury_bonds
  label: 美国国债
  sublabel: 政府信用支持的债权资产
  role: asset
  status: neutral
  layer: 4
  weight: secondary
- id: fiscal_spending
  label: 财政支出
  sublabel: 募集资金用于政府预算
  role: market
  status: neutral
  layer: 5
  weight: secondary
- id: interest_payments
  label: 利息支付
  sublabel: 投资者获得收益，财政承担偿付成本
  role: asset
  status: neutral
  layer: 5
  weight: primary
- id: fiscal_revenue
  label: 财政收入
  sublabel: 税收和再融资支撑本息偿付
  role: asset
  status: neutral
  layer: 6
  weight: secondary
- id: secondary_market
  label: 二级市场
  sublabel: 国债可交易并形成流动性价格
  role: market
  status: neutral
  layer: 6
  weight: secondary
- id: fed_policy
  label: 利率环境
  sublabel: 货币政策影响市场收益率
  role: constraint
  status: neutral
  layer: 7
  weight: secondary
- id: interest_rate_risk
  label: 利率风险
  sublabel: 利率上行压低既有债券价格
  role: risk
  status: negative
  layer: 7
  weight: secondary
edges:
- from: investors
  to: primary_dealers
  label: 认购资金
  type: fund_flow
  direction: forward
- from: primary_dealers
  to: auction
  label: 投标承销
  type: fund_flow
  direction: forward
- from: treasury
  to: auction
  label: 发起发行
  type: issuance
  direction: forward
- from: auction
  to: treasury
  label: 募集资金
  type: fund_flow
  direction: forward
- from: auction
  to: treasury_bonds
  label: 形成债券
  type: issuance
  direction: forward
- from: treasury_bonds
  to: investors
  label: 获得债权
  type: issuance
  direction: forward
- from: treasury
  to: fiscal_spending
  label: 预算支出
  type: fund_flow
  direction: forward
- from: fiscal_revenue
  to: treasury
  label: 偿债来源
  type: fund_flow
  direction: forward
- from: treasury
  to: interest_payments
  label: 支付利息
  type: fund_flow
  direction: forward
- from: interest_payments
  to: investors
  label: 收益归属
  type: fund_flow
  direction: forward
- from: investors
  to: secondary_market
  label: 买卖持仓
  type: fund_flow
  direction: forward
- from: secondary_market
  to: treasury_bonds
  label: 价格发现
  type: information
  direction: forward
- from: auction
  to: fed_policy
  label: 收益率信号
  type: information
  direction: forward
- from: fed_policy
  to: interest_rate_risk
  label: 推动重定价
  type: causal
  direction: forward
- from: interest_rate_risk
  to: investors
  label: 影响需求
  type: causal
  direction: forward
loops: []
render:
  style: default
  show_loops: true
  highlight_nodes:
  - investors
  - interest_payments
  highlight_edges: []
  renderer: mermaid
