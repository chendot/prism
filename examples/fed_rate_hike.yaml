meta:
  title: 美联储加息如何传导
  subtitle: 从政策利率到资产价格与实体融资的链条
  topic: 美联储加息如何传导
  ontology: financial
  template: causal_chain
  visual_theme: warm_layered
  audience: beginner
  language: zh
  tags:
    - fed
    - rates
    - macro

diagram:
  type: flow
  direction: LR

nodes:
  - id: fed
    label: 美联储
    sublabel: 上调政策利率
    role: regulator
    layer: 1
    weight: primary
  - id: short_rates
    label: 短端利率
    sublabel: 银行间资金成本上升
    role: market
    layer: 2
    weight: secondary
  - id: bond_yields
    label: 债券收益率
    sublabel: 折现率和期限溢价重定价
    role: asset
    layer: 3
    weight: secondary
  - id: banks
    label: 商业银行
    sublabel: 提高贷款报价并收紧授信
    role: intermediary
    layer: 3
    weight: muted
  - id: investors
    label: 投资者
    sublabel: 降低风险资产仓位
    role: buyer
    layer: 4
    weight: secondary
  - id: asset_prices
    label: 资产价格
    sublabel: 股票、地产和长久期资产承压
    role: asset
    layer: 5
    weight: secondary
  - id: borrowers
    label: 融资主体
    sublabel: 企业和居民融资成本上升
    role: issuer
    layer: 5
    weight: secondary
  - id: demand
    label: 总需求
    sublabel: 投资和消费降温
    role: market
    layer: 6
    weight: secondary
  - id: inflation
    label: 通胀压力
    sublabel: 需求降温后逐步回落
    role: risk
    layer: 7
    weight: primary

edges:
  - from: fed
    to: short_rates
    label: 上调政策利率
    type: causal
    direction: forward
  - from: short_rates
    to: bond_yields
    label: 推高市场利率
    type: causal
    direction: forward
  - from: short_rates
    to: banks
    label: 提高资金成本
    type: causal
    direction: forward
  - from: bond_yields
    to: investors
    label: 改变风险收益比较
    type: information
    direction: forward
  - from: investors
    to: asset_prices
    label: 降低估值
    type: fund_flow
    direction: forward
  - from: banks
    to: borrowers
    label: 收紧信贷
    type: fund_flow
    direction: forward
  - from: borrowers
    to: demand
    label: 投资消费放缓
    type: causal
    direction: forward
  - from: demand
    to: inflation
    label: 缓解价格压力
    type: causal
    direction: forward
  - from: inflation
    to: fed
    label: 影响后续政策路径
    type: feedback
    direction: forward

loops:
  - id: policy_inflation_loop
    label: 政策-通胀反馈
    nodes:
      - fed
      - short_rates
      - borrowers
      - demand
      - inflation
    polarity: negative

render:
  style: default
  show_loops: true
  highlight_nodes:
    - fed
    - inflation
  highlight_edges: []
  renderer: mermaid
