meta:
  title: 稳定币挑战的是利息分配权
  subtitle: null
  topic: 稳定币挑战的是利息分配权
  ontology: financial
  template: value_flow
  visual_theme: warm_layered
  target_format: null
  audience: intermediate
  language: zh
  tags:
  - stablecoin
  - interest
  - value_flow
  - defi
diagram:
  type: flow
  direction: LR
nodes:
- id: users
  label: 用户
  sublabel: 用法币购买稳定币并承担持有机会成本
  role: buyer
  layer: 1
  weight: secondary
- id: fiat_deposit
  label: 法币存款
  sublabel: 用户交出的现金或银行存款
  role: asset
  layer: 2
  weight: secondary
- id: stablecoin_issuer
  label: 稳定币发行方
  sublabel: 接收法币并铸造稳定币
  role: issuer
  layer: 3
  weight: secondary
- id: stablecoin
  label: 稳定币
  sublabel: 对外承诺接近一比一兑付的链上资产
  role: asset
  layer: 4
  weight: secondary
- id: reserve_assets
  label: 储备资产
  sublabel: 国债、回购、银行存款等低风险资产
  role: asset
  layer: 4
  weight: secondary
- id: reserve_interest
  label: 储备利息
  sublabel: 储备资产产生的收益主要归发行方
  role: market
  layer: 5
  weight: primary
- id: exchanges_wallets
  label: 交易所钱包
  sublabel: 帮助稳定币流通、托管和兑换
  role: intermediary
  layer: 5
  weight: secondary
- id: crypto_market
  label: 加密市场
  sublabel: 将稳定币用作交易、结算和抵押媒介
  role: market
  layer: 6
  weight: secondary
- id: depeg_risk
  label: 脱锚风险
  sublabel: 储备质量或挤兑压力可能损害兑付
  role: risk
  layer: 6
  weight: secondary
- id: regulation
  label: 监管约束
  sublabel: 要求披露储备、限制收益归属或强化赎回规则
  role: constraint
  layer: 7
  weight: secondary
edges:
- from: users
  to: fiat_deposit
  label: 提供资金
  type: fund_flow
  direction: forward
- from: fiat_deposit
  to: stablecoin_issuer
  label: 进入发行体系
  type: fund_flow
  direction: forward
- from: stablecoin_issuer
  to: stablecoin
  label: 铸造代币
  type: issuance
  direction: forward
- from: stablecoin
  to: users
  label: 获得链上余额
  type: issuance
  direction: forward
- from: stablecoin_issuer
  to: reserve_assets
  label: 配置储备
  type: fund_flow
  direction: forward
- from: reserve_assets
  to: reserve_interest
  label: 产生利息
  type: fund_flow
  direction: forward
- from: reserve_interest
  to: stablecoin_issuer
  label: 收益归集
  type: fund_flow
  direction: forward
- from: users
  to: exchanges_wallets
  label: 存入和转账
  type: fund_flow
  direction: forward
- from: exchanges_wallets
  to: crypto_market
  label: 提供流动性
  type: fund_flow
  direction: forward
- from: reserve_assets
  to: depeg_risk
  label: 储备波动影响兑付
  type: causal
  direction: forward
- from: depeg_risk
  to: users
  label: 风险由持有人承受
  type: causal
  direction: forward
- from: regulation
  to: stablecoin_issuer
  label: 约束发行与披露
  type: authorization
  direction: forward
- from: regulation
  to: reserve_interest
  label: 影响利息归属
  type: authorization
  direction: forward
loops: []
render:
  style: default
  show_loops: true
  highlight_nodes:
  - users
  - reserve_interest
  - stablecoin_issuer
  highlight_edges: []
  renderer: mermaid
