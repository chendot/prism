meta:
  title: BTC减半周期传导机制
  subtitle: null
  topic: BTC减半周期传导机制
  ontology: financial
  template: causal_chain
  visual_theme: warm_layered
  target_format: null
  audience: intermediate
  language: zh
  tags:
  - bitcoin
  - halving
  - crypto
  - market_cycle
diagram:
  type: flow
  direction: LR
nodes:
- id: bitcoin_protocol
  label: 比特币协议
  sublabel: 按固定区块高度降低区块补贴
  role: issuer
  layer: 1
  weight: secondary
- id: miner_revenue
  label: 矿工收入
  sublabel: 单区块新增 BTC 奖励减少
  role: intermediary
  layer: 2
  weight: secondary
- id: miner_sell_pressure
  label: 矿工抛压
  sublabel: 可出售的新币供给下降
  role: risk
  layer: 3
  weight: secondary
- id: new_supply
  label: 新增供给
  sublabel: 市场每日新增 BTC 流入放缓
  role: asset
  layer: 4
  weight: secondary
- id: scarcity_expectation
  label: 稀缺预期
  sublabel: 投资者重新定价长期供给约束
  role: market
  layer: 5
  weight: secondary
- id: investor_demand
  label: 买方需求
  sublabel: 现货、ETF 与长期持有者增配
  role: buyer
  layer: 6
  weight: secondary
- id: market_liquidity
  label: 市场流动性
  sublabel: 资金环境决定需求能否放大
  role: market
  layer: 7
  weight: secondary
- id: btc_price
  label: BTC价格
  sublabel: 供需缺口反映到现货价格
  role: asset
  layer: 8
  weight: secondary
- id: speculative_leverage
  label: 杠杆投机
  sublabel: 价格上涨吸引衍生品和短线资金
  role: risk
  layer: 9
  weight: secondary
- id: cycle_peak_risk
  label: 周期顶部风险
  sublabel: 高杠杆和过热预期提高回撤概率
  role: risk
  layer: 10
  weight: secondary
edges:
- from: bitcoin_protocol
  to: miner_revenue
  label: 降低区块补贴
  type: causal
  direction: forward
- from: miner_revenue
  to: miner_sell_pressure
  label: 减少可卖新币
  type: causal
  direction: forward
- from: miner_sell_pressure
  to: new_supply
  label: 降低边际供给
  type: causal
  direction: forward
- from: new_supply
  to: scarcity_expectation
  label: 强化供给约束
  type: information
  direction: forward
- from: scarcity_expectation
  to: investor_demand
  label: 提升配置意愿
  type: information
  direction: forward
- from: market_liquidity
  to: investor_demand
  label: 放大购买能力
  type: fund_flow
  direction: forward
- from: investor_demand
  to: btc_price
  label: 推动现货买盘
  type: fund_flow
  direction: forward
- from: btc_price
  to: speculative_leverage
  label: 吸引追涨资金
  type: causal
  direction: forward
- from: speculative_leverage
  to: btc_price
  label: 短期放大涨跌
  type: feedback
  direction: forward
- from: speculative_leverage
  to: cycle_peak_risk
  label: 累积清算风险
  type: causal
  direction: forward
- from: cycle_peak_risk
  to: investor_demand
  label: 削弱后续买盘
  type: feedback
  direction: forward
loops:
- id: price_leverage_loop
  label: 价格-杠杆正反馈
  nodes:
  - investor_demand
  - btc_price
  - speculative_leverage
  polarity: positive
- id: overheating_cooling_loop
  label: 过热-需求降温反馈
  nodes:
  - investor_demand
  - btc_price
  - speculative_leverage
  - cycle_peak_risk
  polarity: negative
render:
  style: default
  show_loops: true
  highlight_nodes:
  - bitcoin_protocol
  - btc_price
  - cycle_peak_risk
  highlight_edges: []
  renderer: mermaid
