name: crypto
description: 公链、DeFi 协议、代币化资产与用户接入组成的链上技术栈。

roles:
  settlement_layer:
    label_zh: 结算层
    visual:
      shape: rect
      border_width: 2.0
      radius: 8
      accent_bar: false
  l2_stack:
    label_zh: L2 技术栈
    visual:
      shape: rect
      border_width: 1.5
      radius: 8
      accent_bar: true
  chain:
    label_zh: 公链
    visual:
      shape: double_border
      border_width: 2.0
      radius: 8
      accent_bar: true
  infrastructure:
    label_zh: 基础设施
    visual:
      shape: rect
      border_width: 1.0
      radius: 8
      accent_bar: false
  protocol:
    label_zh: 协议
    visual:
      shape: double_border
      border_width: 1.5
      radius: 8
      accent_bar: true
  asset:
    label_zh: 链上资产
    visual:
      shape: rect
      border_width: 1.0
      radius: 8
      accent_bar: true
  access:
    label_zh: 用户入口
    visual:
      shape: round
      border_width: 1.5
      radius: 16
      accent_bar: false
  participant:
    label_zh: 用户
    visual:
      shape: round
      border_width: 1.5
      radius: 16
      accent_bar: false

edge_types:
  depends_on:
    label_zh: 依赖
    visual:
      stroke_width: 1.1
      stroke_dash: "1,3"
      arrow: open_triangle
  enables:
    label_zh: 使能
    visual:
      stroke_width: 1.2
      stroke_dash: null
      arrow: filled_triangle
  abstracts:
    label_zh: 抽象封装
    visual:
      stroke_width: 1.0
      stroke_dash: "4,4"
      arrow: open_triangle

weights:
  primary:
    scale: 1.0
    fill: "#e07b5a"
    text: "#fdf6ec"
    border: "#e07b5a"
    opacity: 1.0
  secondary:
    scale: 1.0
    fill: "#2a2018"
    text: "#c9a96e"
    border: "#c9a96e"
    opacity: 1.0
  muted:
    scale: 0.85
    fill: "none"
    text: "#8a7a5c"
    border: "#5a4d3a"
    opacity: 0.7

perspectives:
  - name: 技术栈视角
    focus: 结算、执行、协议、资产与接入的跨层依赖
  - name: 控制权视角
    focus: 哪些层由单一主体运营，哪些层允许第三方替换
