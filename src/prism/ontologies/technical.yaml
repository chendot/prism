name: technical
description: 技术/物理系统

roles:
  component:
    label_zh: 组件
    fill: "#DBEAFE"
    stroke: "#60A5FA"
  controller:
    label_zh: 控制器
    fill: "#EDE9FE"
    stroke: "#A78BFA"
  sensor:
    label_zh: 传感器
    fill: "#DCFCE7"
    stroke: "#4ADE80"
  actuator:
    label_zh: 执行器
    fill: "#FEF9C3"
    stroke: "#FACC15"
  environment:
    label_zh: 环境
    fill: "#F3F4F6"
    stroke: "#9CA3AF"
  risk:
    label_zh: 风险节点
    fill: "#FEE2E2"
    stroke: "#F87171"

edge_types:
  energy_flow:
    label_zh: 能量流
    color: "#EA580C"
    style: solid
  signal:
    label_zh: 信号
    color: "#2563EB"
    style: dashed
  control:
    label_zh: 控制
    color: "#7C3AED"
    style: solid
  material_flow:
    label_zh: 物质流
    color: "#16A34A"
    style: solid
  failure:
    label_zh: 失效
    color: "#DC2626"
    style: dashed

weights:
  primary:
    scale: 1.35
    fill: "#e07b5a"
    text: "#fdf6ec"
    border: "#e07b5a"
    opacity: 1.0
  secondary:
    scale: 1.0
    fill: "#2a2018"
    text: "#c9a96e"
    border: "#c9a96e"
    opacity: 1.0
  muted:
    scale: 0.85
    fill: "none"
    text: "#8a7a5c"
    border: "#5a4d3a"
    opacity: 0.7

perspectives:
  - name: 结构视角
    focus: 组件、连接、边界
  - name: 动力视角
    focus: 能量、物质、信号流动
  - name: 控制视角
    focus: 反馈、传感、执行
  - name: 失效视角
    focus: 风险、瓶颈、冗余
