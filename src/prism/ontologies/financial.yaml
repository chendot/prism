name: financial
description: 金融/DeFi/宏观系统

roles:
  issuer:
    label_zh: 发行方
    visual:
      shape: rect
      border_width: 2.0
      radius: 8
      accent_bar: true
  buyer:
    label_zh: 购买方
    visual:
      shape: round
      border_width: 1.5
      radius: 16
      accent_bar: false
  regulator:
    label_zh: 监管方
    visual:
      shape: rect
      border_width: 2.0
      radius: 8
      accent_bar: false
  constraint:
    label_zh: 外部约束
    visual:
      shape: rect
      border_width: 2.0
      radius: 8
      accent_bar: false
  intermediary:
    label_zh: 中间商
    visual:
      shape: double_border
      border_width: 1.5
      radius: 8
      accent_bar: true
  market:
    label_zh: 市场机制
    visual:
      shape: rect
      border_width: 1.0
      radius: 8
      accent_bar: true
  risk:
    label_zh: 风险节点
    visual:
      shape: rect
      border_width: 2.0
      border_dash: "4,3"
      radius: 8
      accent_bar: false
  asset:
    label_zh: 资产
    visual:
      shape: rect
      border_width: 1.0
      radius: 8
      accent_bar: true
  entry:
    label_zh: 入口
    visual:
      shape: round
      border_width: 1.5
      radius: 16
      accent_bar: false
  protocol:
    label_zh: 协议
    visual:
      shape: double_border
      border_width: 1.5
      radius: 8
      accent_bar: true
  flow_step:
    label_zh: 流程节点
    visual:
      shape: rect
      border_width: 1.0
      radius: 8
      accent_bar: true
  benefit:
    label_zh: 收益节点
    visual:
      shape: rect
      border_width: 1.5
      radius: 8
      accent_bar: true
  owner:
    label_zh: 归属方
    visual:
      shape: rect
      border_width: 2.0
      radius: 8
      accent_bar: true
  thesis:
    label_zh: 核心判断
    visual:
      shape: rect
      border_width: 2.0
      radius: 8
      scale: 1.15
      accent_bar: true

edge_types:
  fund_flow:
    label_zh: 资金流
    visual:
      stroke_width: 1.2
      stroke_dash: null
      arrow: filled_triangle
  authorization:
    label_zh: 授权
    visual:
      stroke_width: 1.0
      stroke_dash: "4,4"
      arrow: open_triangle
  information:
    label_zh: 信息
    visual:
      stroke_width: 1.0
      stroke_dash: "1,3"
      arrow: none
  issuance:
    label_zh: 发行
    visual:
      stroke_width: 1.2
      stroke_dash: null
      arrow: filled_triangle
  causal:
    label_zh: 因果
    visual:
      stroke_width: 1.2
      stroke_dash: null
      arrow: filled_triangle
  feedback:
    label_zh: 反馈
    visual:
      stroke_width: 1.0
      stroke_dash: "4,4"
      arrow: open_triangle
  flow:
    label_zh: 价值流
    visual:
      stroke_width: 1.2
      stroke_dash: null
      arrow: filled_triangle
  benefit_flow:
    label_zh: 收益流
    visual:
      stroke_width: 2.0
      stroke_dash: null
      arrow: filled_triangle_large
  control:
    label_zh: 控制
    visual:
      stroke_width: 1.0
      stroke_dash: "4,4"
      arrow: open_triangle
  depends:
    label_zh: 依赖
    visual:
      stroke_width: 1.0
      stroke_dash: "1,3"
      arrow: none
  causes:
    label_zh: 导致
    visual:
      stroke_width: 1.2
      stroke_dash: null
      arrow: filled_triangle

weights:
  primary:
    scale: 1.0
    fill: "#e07b5a"
    text: "#fdf6ec"
    border: "#e07b5a"
    opacity: 1.0
  secondary:
    scale: 1.0
    fill: "#2a2018"
    text: "#c9a96e"
    border: "#c9a96e"
    opacity: 1.0
  muted:
    scale: 0.85
    fill: "none"
    text: "#8a7a5c"
    border: "#5a4d3a"
    opacity: 0.7

perspectives:
  - name: 货币视角
    focus: 货币供给、利率传导、通胀
  - name: 财政视角
    focus: 赤字、债务上限、国会博弈
  - name: 市场视角
    focus: 拍卖机制、一级交易商、流动性
  - name: 地缘视角
    focus: 外国央行持仓、美元体系
